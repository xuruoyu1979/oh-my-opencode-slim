name: Bug report
description: Report a reproducible bug in oh-my-opencode-slim.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Keep it short, but include enough detail for us to reproduce it.
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: The plugin crashes when I run...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: It should...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Share the smallest repro you can.
      placeholder: |
        1. Run...
        2. Open...
        3. See...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Paste the relevant part of your OpenCode or plugin config. Remove secrets first.
      render: jsonc
    validations:
      required: true
  - type: input
    id: opencode-version
    attributes:
      label: OpenCode version
      placeholder: 0.4.12
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: oh-my-opencode-slim version
      placeholder: 0.0.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or extra context
      description: Add anything else that may help us reproduce or understand the bug.
      render: shell
    validations:
      required: false
